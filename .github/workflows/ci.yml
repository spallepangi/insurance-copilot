# CI: run tests and optional quick evaluation.
# Add OPENAI_API_KEY, QDRANT_URL, QDRANT_API_KEY, HUGGINGFACE_TOKEN to repo secrets to run evaluation.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short
        env:
          # Minimal env so config loads (no real keys needed for unit/api tests)
          OPENAI_API_KEY: ""
          QDRANT_URL: http://localhost:6333
          HUGGINGFACE_TOKEN: ""

  eval:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Quick evaluation (5 queries)
        run: .venv/bin/python -m src.evaluation.evaluation_runner --limit=5
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        continue-on-error: true  # Don't fail CI if secrets not set or eval timeout
